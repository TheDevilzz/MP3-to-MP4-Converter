# Apache vhost template for MP3 to MP4 Studio.
# Apache vhost for convert.kindeeyudee.com.
#
# Required modules:
#   a2enmod proxy proxy_http headers rewrite ssl
#
# The Node app listens on 127.0.0.1:4000 via PM2 and serves both API + built React files.

<VirtualHost *:80>
    ServerName convert.kindeeyudee.com

    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName convert.kindeeyudee.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/convert.kindeeyudee.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/convert.kindeeyudee.com/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 3600
    Timeout 3600
    LimitRequestBody 0

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"

    ProxyPass / http://127.0.0.1:4000/ connectiontimeout=5 timeout=3600 retry=0
    ProxyPassReverse / http://127.0.0.1:4000/

    ErrorLog ${APACHE_LOG_DIR}/mp3-to-mp4-error.log
    CustomLog ${APACHE_LOG_DIR}/mp3-to-mp4-access.log combined
</VirtualHost>
</IfModule>
